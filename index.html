<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>ar-gr by Diego Capani</title>
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
</head>

<body style="margin: 0px; overflow: hidden;">

    <a-scene embedded arjs="sourceType: webcam; detectionMode: mono_and_matrix; matrixCodeType: 3x3; debugUIEnabled: false;">

        <a-assets>
            <a-asset-item id="modello-1" src="assets/modello1.glb"></a-asset-item>
            <a-asset-item id="modello-2" src="assets/modello2.glb"></a-asset-item>
            <a-asset-item id="modello-3" src="assets/modello3.glb"></a-asset-item>
        </a-assets>

        <a-marker type="barcode" value="0">
            <a-entity 
                gltf-model="#modello-1" 
                scale="3 3 3" 
                position="0 0 0" 
                rotation="0 90 0"
                animation="property: rotation; to: 0 360 0; loop: true; dur: 10000">
            </a-entity>
        </a-marker>

        <a-marker type="barcode" value="1">
            <a-entity 
                gltf-model="#modello-2" 
                scale="3 3 3" 
                position="0 0 0"
                rotation="0 90 0">
            </a-entity>
        </a-marker>

        <a-marker type="barcode" value="2">
            <a-entity 
                gltf-model="#modello-3" 
                scale="3 3 3" 
                position="0 0 0"
                rotation="0 90 0">
            </a-entity>
        </a-marker>

        <a-entity camera></a-entity>

    </a-scene>

</body>
</html>
