<!DOCTYPE html>
<html>
  <head>
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
  </head>
  <body style="margin: 0; overflow: hidden;">
    <a-scene embedded arjs>
      
      <a-assets>
        <a-asset-item id="mioModello" src="scena1.glb"></a-asset-item>
        
      </a-assets>

      <a-marker 
        preset="hiro" 
        smooth="true" 
        smoothCount="10" 
        smoothTolerance="0.01" 
        smoothThreshold="5">
        
        <a-entity 
          gltf-model="#mioModello" 
          scale="0.3 0.3 0.3" 
          position="0 0 0" 
          rotation="0 0 0">
          
          

        </a-entity>
        
      </a-marker>

      <a-entity camera></a-entity>
    </a-scene>
  </body>
</html>
